<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>建卡端</title>
    <style>
        :root { --primary-color: #2d3748; --bg-color: #f5f0e8; --border-color: #a09080; }
        * { box-sizing: border-box; }
        body { font-family: 'Microsoft YaHei', sans-serif; background: var(--bg-color); color: #333; margin: 0; padding: 20px; display: flex; justify-content: center; }
        .container { display: flex; gap: 20px; max-width: 1200px; width: 100%; }
        .main-panel, .side-panel { background: #fff; padding: 20px; border: 2px solid var(--border-color); border-radius: 8px; box-shadow: 0 4px 6px rgba(0,0,0,0.08); }
        .main-panel { flex: 2; position: relative; }
        .side-panel { flex: 1; height: fit-content; }
        h1, h2, h3 { color: var(--primary-color); border-bottom: 1px solid var(--border-color); padding-bottom: 5px; }
        .form-group { margin-bottom: 14px; }
        label { display: inline-block; width: 80px; font-weight: bold; vertical-align: top; }
        input[type="text"], input[type="number"], input[type="password"], textarea { width: calc(100% - 90px); padding: 8px; border: 1px solid #ccc; border-radius: 4px; font-family: inherit; font-size: 14px; }
        .attr-group { display: flex; flex-wrap: wrap; gap: 10px; }
        .attr-group div { display: flex; align-items: center; flex-wrap: wrap; width: 45%; }
        .stat-desc { font-size: 11px; color: #999; margin-left: 90px; margin-top: 2px; width: 100%; }
        .attr-group label { width: 90px; }
        .attr-group input { width: 80px; }
        .warning { color: red; font-size: 13px; display: none; margin-top: 5px; }
        button { background: var(--primary-color); color: #fff; border: none; padding: 10px 20px; cursor: pointer; border-radius: 4px; font-size: 14px; }
        button:hover { filter: brightness(1.2); }
        .dynamic-card { border: 1px dashed var(--border-color); padding: 10px; margin-bottom: 10px; background: #faf8f5; border-radius: 4px; position: relative; }
        .remove-btn { position: absolute; top: 6px; right: 6px; background: #e53e3e; padding: 2px 8px; font-size: 12px; }
        .currency-box { display: flex; gap: 10px; align-items: center; margin-bottom: 10px; flex-wrap: wrap; }
        .currency-box input { width: 60px; }
        #status-bar { padding: 10px; text-align: center; font-weight: bold; margin-bottom: 14px; border-radius: 4px; color: #2b6cb0; display: none; background: #e2e8f0; }
        #resetBtn { background: #718096; position: absolute; right: 20px; top: 20px; }
        .nav-home { position: absolute; left: 20px; top: 20px; background: #555; text-decoration: none; color: white; padding: 8px 14px; border-radius: 4px; font-size: 13px; }
        .room-indicator { display: inline-block; background: #ebf8ff; color: #2b6cb0; padding: 3px 10px; border-radius: 12px; font-size: 12px; margin-left: 10px; vertical-align: middle; }

        /* 技能预设网格 */
        .skills-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 5px; margin-bottom: 10px; }
        .coc-skill-row { display: flex; align-items: center; gap: 6px; padding: 5px 8px; background: #faf8f5; border: 1px solid var(--border-color); border-radius: 4px; }
        .coc-skill-row .sn { flex: 1; font-size: 13px; font-weight: bold; }
        .coc-skill-row .sb { font-size: 11px; color: #aaa; white-space: nowrap; }
        .skill-val-input { width: 54px; padding: 3px 5px; border: 1px solid #ccc; border-radius: 3px; text-align: center; font-size: 13px; }
        .dnd-skill-row { display: flex; align-items: center; gap: 8px; padding: 6px 10px; background: #fdf8f2; border: 1px solid var(--border-color); border-radius: 4px; }
        .dnd-skill-row .sn { flex: 1; font-size: 13px; }
        .stat-pill { background: var(--bg-color); border: 1px solid var(--border-color); color: #555; padding: 1px 6px; border-radius: 8px; font-size: 11px; font-weight: bold; white-space: nowrap; }
        .prof-check { width: 16px; height: 16px; cursor: pointer; accent-color: var(--primary-color); }
        .custom-skill-tip { font-size: 12px; color: #999; margin: 8px 0 4px; }

        /* 移动端适配 */
        @media (max-width: 768px) {
            body { padding: 10px; }
            .container { flex-direction: column; }
            .side-panel { display: none; }
            input[type="text"], input[type="number"], input[type="password"], textarea { width: calc(100% - 90px); }
            .attr-group div { width: 100%; }
            #resetBtn { position: static; margin-bottom: 10px; }
            .nav-home { position: static; display: inline-block; margin-bottom: 10px; }
            h1 { margin-top: 10px !important; }
            .skills-grid { grid-template-columns: 1fr; }
        }
    </style>
</head>
<body>
<div class="container">
    <div class="main-panel">
        <a href="/" class="nav-home">← 主页</a>
        <button id="resetBtn">建新卡</button>
        <h1 id="page-title" style="text-align:center; margin-top:50px;">角色卡录入</h1>
        <div id="status-bar"></div>

        <div class="form-group"><label>名字:</label><input type="text" id="charName" placeholder="输入角色名字"></div>
        <div class="form-group"><label id="label-realm">职业:</label><input type="text" id="charRealm"></div>
        <div class="form-group"><label id="label-appearance">外貌:</label><input type="text" id="charApp"></div>
        <div class="form-group"><label id="label-background">背景:</label><textarea id="charBg" rows="3"></textarea></div>

        <div class="form-group" style="background:#f7fafc; padding:10px; border-radius:4px; border-left:4px solid #3182ce;">
            <label style="color:#2b6cb0;">卡片密码:</label>
            <input type="password" id="charPwd" placeholder="可选：留空则公开，设密码则加密保护">
            <div id="pwd-hint" style="font-size:12px; color:#e53e3e; margin-left:85px; margin-top:4px; display:none;">* 此卡已有密码，留空则保持不变，输入新值则更新密码。</div>
            <div style="font-size:12px; color:#718096; margin-left:85px; margin-top:4px;">* 设置密码后，其他人查看此卡时需输入密码。</div>
        </div>

        <div id="section-traits">
        <h2 id="traits-title">✨ 特性录入</h2>
        <div id="traits-container"></div>
        <button type="button" id="add-trait-btn" onclick="addTrait()" style="background:#718096; margin-bottom:14px;">+ 添加特性</button>
        </div>

        <h2>📊 属性分配 <span style="font-size:13px; color:#718096;">总和: <span id="points-total" style="color:var(--primary-color); font-weight:bold;">0</span></span></h2>
        <div class="attr-group" id="stats-container"></div>
        <div id="attr-warning" class="warning">警告：有属性低于最小值！</div>

        <h2 id="currency-title" style="display:none;">💰 资产</h2>
        <div class="currency-box" id="currency-container"></div>

        <div id="section-items">
        <h2>🎒 物品</h2>
        <div id="items-container"></div>
        <button type="button" onclick="addItem()" style="background:#718096;">+ 添加物品</button>
        </div>

        <div id="section-skills">
        <h2 id="skills-title">📜 技能录入</h2>
        <div id="skills-preset"></div>
        <p class="custom-skill-tip" id="custom-skill-tip" style="display:none;">自定义技能（不在预设列表内）：</p>
        <div id="skills-container"></div>
        <button type="button" id="add-skill-btn" onclick="addCustomSkill()" style="background:#718096;">+ 添加技能</button>
        </div>

        <hr style="margin:28px 0; border:1px solid var(--border-color);">
        <button id="submitBtn" style="width:100%; font-size:17px; font-weight:bold; padding:14px;">创建角色卡</button>
    </div>

    <div class="side-panel">
        <div id="reference-content"></div>
    </div>
</div>

<script>
    let CONFIG = null;
    let TRAIT_CFG = {section_title: '特性录入', field_name: '名字', field_grade: '品级', field_effect: '效果'};
    const urlParams = new URLSearchParams(window.location.search);
    const urlId = urlParams.get('id');
    const urlPwd = urlParams.get('pwd');
    const roomId = urlParams.get('room') || 'global';
    let myCharId = localStorage.getItem('char_id');
    const statusBar = document.getElementById('status-bar');
    const submitBtn = document.getElementById('submitBtn');

    async function init() {
        const res = await fetch('/api/config');
        CONFIG = await res.json();
        applyTheme();
        applyLabels();
        renderStats();
        renderCurrency();
        renderReference();
        renderSkillSection();
        applySections();
        if (urlParams.get('new')) { localStorage.removeItem('char_id'); myCharId = null; }
        loadCharacter();
    }

    function renderSkillSection() {
        const mode = CONFIG.character.skill_mode || 'generic';
        const preset = CONFIG.character.skills_preset || [];
        if (mode === 'coc') {
            document.getElementById('skills-title').textContent = '📜 技能分配';
            document.getElementById('add-skill-btn').textContent = '+ 添加自定义技能';
            renderCocSkills(preset);
        } else if (mode === 'dnd') {
            document.getElementById('skills-title').textContent = '📜 技能熟练';
            document.getElementById('add-skill-btn').textContent = '+ 添加自定义技能';
            renderDndSkills(preset);
        }
        if (preset.length > 0) document.getElementById('custom-skill-tip').style.display = '';
    }

    function renderCocSkills(preset) {
        document.getElementById('skills-preset').innerHTML =
            '<div class="skills-grid">' + preset.map(s =>
                `<div class="coc-skill-row">
                    <span class="sn">${s.name}</span>
                    <span class="sb">基础${s.base}%</span>
                    <input type="number" class="skill-val-input" data-skill="${s.name}" data-base="${s.base}"
                           value="${s.base}" min="0" max="99">
                    <span style="font-size:12px">%</span>
                </div>`
            ).join('') + '</div>';
    }

    function renderDndSkills(preset) {
        document.getElementById('skills-preset').innerHTML =
            '<div class="skills-grid">' + preset.map(s =>
                `<div class="dnd-skill-row">
                    <input type="checkbox" class="prof-check" data-skill="${s.name}" data-stat="${s.stat}">
                    <span class="stat-pill">${s.stat.toUpperCase()}</span>
                    <span class="sn">${s.name}</span>
                </div>`
            ).join('') + '</div>';
    }

    function collectSkills() {
        const mode = CONFIG?.character?.skill_mode || 'generic';
        const skills = [];
        if (mode === 'coc') {
            document.querySelectorAll('.skill-val-input').forEach(input => {
                skills.push({name: input.dataset.skill, value: parseInt(input.value) || 0, base: parseInt(input.dataset.base) || 0});
            });
            document.querySelectorAll('.skill-card').forEach(card => {
                const name = card.querySelector('.sk-name')?.value?.trim();
                if (name) skills.push({name, value: parseInt(card.querySelector('.sk-val')?.value) || 0});
            });
        } else if (mode === 'dnd') {
            document.querySelectorAll('.prof-check').forEach(chk => {
                skills.push({name: chk.dataset.skill, stat: chk.dataset.stat, prof: chk.checked});
            });
            document.querySelectorAll('.skill-card').forEach(card => {
                const name = card.querySelector('.sk-name')?.value?.trim();
                if (name) skills.push({name, stat: card.querySelector('.sk-stat')?.value || '', prof: !!card.querySelector('.sk-prof')?.checked});
            });
        } else {
            document.querySelectorAll('.skill-card').forEach(card => {
                const name = card.querySelector('.sk-name')?.value?.trim();
                if (name) skills.push({name, realm: card.querySelector('.sk-realm')?.value || '', desc: card.querySelector('.sk-desc')?.value || '', effect: card.querySelector('.sk-effect')?.value || ''});
            });
        }
        return skills;
    }

    function fillSkills(skills) {
        if (!skills || skills.length === 0) return;
        const mode = CONFIG?.character?.skill_mode || 'generic';
        if (mode === 'coc') {
            const map = {};
            skills.forEach(s => { if (s.name) map[s.name] = s.value; });
            document.querySelectorAll('.skill-val-input').forEach(input => {
                if (map[input.dataset.skill] !== undefined) input.value = map[input.dataset.skill];
            });
            const presetNames = new Set(Array.from(document.querySelectorAll('.skill-val-input')).map(i => i.dataset.skill));
            skills.filter(s => !presetNames.has(s.name)).forEach(s => {
                addCustomSkill();
                const cards = document.querySelectorAll('#skills-container .skill-card');
                const card = cards[cards.length - 1];
                if (card) { card.querySelector('.sk-name').value = s.name; if (card.querySelector('.sk-val')) card.querySelector('.sk-val').value = s.value || 0; }
            });
        } else if (mode === 'dnd') {
            const map = {};
            skills.forEach(s => { if (s.name) map[s.name] = s.prof; });
            document.querySelectorAll('.prof-check').forEach(chk => {
                if (map[chk.dataset.skill] !== undefined) chk.checked = !!map[chk.dataset.skill];
            });
            const presetNames = new Set(Array.from(document.querySelectorAll('.prof-check')).map(c => c.dataset.skill));
            skills.filter(s => !presetNames.has(s.name)).forEach(s => {
                addCustomSkill();
                const cards = document.querySelectorAll('#skills-container .skill-card');
                const card = cards[cards.length - 1];
                if (card) { card.querySelector('.sk-name').value = s.name || ''; if (card.querySelector('.sk-stat')) card.querySelector('.sk-stat').value = s.stat || ''; if (card.querySelector('.sk-prof')) card.querySelector('.sk-prof').checked = !!s.prof; }
            });
        } else {
            skills.forEach(s => addCustomSkill(s.name, s.realm, s.desc, s.effect));
        }
    }

    function applyTheme() {
        const t = CONFIG.theme;
        document.documentElement.style.setProperty('--primary-color', t.primary_color);
        document.documentElement.style.setProperty('--bg-color', t.bg_color);
        document.documentElement.style.setProperty('--border-color', t.border_color);
        document.title = CONFIG.app.name + ' - 建卡';
        const roomLabel = roomId !== 'global' ? `<span class="room-indicator">📋 ${roomId}</span>` : '';
        document.getElementById('page-title').innerHTML = `🗡️ ${CONFIG.app.name} 角色卡录入${roomLabel}`;
    }

    function applyLabels() {
        const f = CONFIG.character.fields;
        document.getElementById('label-realm').textContent = f.realm.label + ':';
        document.getElementById('label-appearance').textContent = f.appearance.label + ':';
        document.getElementById('label-background').textContent = f.background.label + ':';
        document.getElementById('charRealm').placeholder = f.realm.placeholder;
        document.getElementById('charApp').placeholder = f.appearance.placeholder;
        document.getElementById('charBg').placeholder = f.background.placeholder;
        if (CONFIG.character.traits_config) {
            TRAIT_CFG = CONFIG.character.traits_config;
            document.getElementById('traits-title').textContent = '✨ ' + TRAIT_CFG.section_title;
            document.getElementById('add-trait-btn').textContent = '+ 添加' + TRAIT_CFG.field_name;
        }
    }

    function renderStats() {
        const container = document.getElementById('stats-container');
        container.innerHTML = '';
        CONFIG.character.stats.forEach(stat => {
            const div = document.createElement('div');
            div.innerHTML = `<label>${stat.label}:</label><input type="number" id="attr-${stat.key}" class="attr-input" value="${stat.default}" min="${stat.min}" oninput="calcStats()">${stat.desc ? `<span class="stat-desc">${stat.desc}</span>` : ''}`;
            container.appendChild(div);
        });
        calcStats();
    }

    function applySections() {
        const s = CONFIG.character.sections || {};
        ['traits', 'skills', 'items'].forEach(sec => {
            const el = document.getElementById('section-' + sec);
            if (el) el.style.display = s[sec] === false ? 'none' : '';
        });
    }

    function renderCurrency() {
        const cur = CONFIG.currency;
        if (!cur.enabled) return;
        document.getElementById('currency-title').style.display = '';
        const container = document.getElementById('currency-container');
        container.innerHTML = cur.units.map(u =>
            `<input type="number" id="coin-${u.key}" value="0"> ${u.label}`
        ).join(' ') + ` <button type="button" onclick="calcCurrency()">整理</button>`;
    }

    function renderReference() {
        const ref = CONFIG.reference;
        if (!ref || !ref.sections || ref.sections.length === 0) return;
        let html = `<h2>📚 ${ref.title}</h2>`;
        ref.sections.forEach(s => {
            html += `<h3>${s.title}</h3>` + s.items.map(i => `<p style="margin:4px 0; font-size:13px;">${i}</p>`).join('');
        });
        document.getElementById('reference-content').innerHTML = html;
    }

    function calcStats() {
        let sum = 0, valid = true;
        document.querySelectorAll('.attr-input').forEach(input => {
            const val = parseInt(input.value) || 0;
            if (val < parseInt(input.min || 0)) valid = false;
            sum += val;
        });
        document.getElementById('points-total').innerText = sum;
        document.getElementById('attr-warning').style.display = valid ? 'none' : 'block';
    }

    function calcCurrency() {
        const units = CONFIG.currency.units;
        let total = units.reduce((acc, u) => acc + (parseInt(document.getElementById('coin-' + u.key).value) || 0) * u.rate, 0);
        units.forEach(u => {
            const val = Math.floor(total / u.rate);
            document.getElementById('coin-' + u.key).value = val;
            total -= val * u.rate;
        });
    }

    function removeParent(btn) { btn.parentElement.remove(); }

    function addTrait(name='', grade='', effect='') {
        const div = document.createElement('div');
        div.className = 'dynamic-card trait-card';
        div.innerHTML = `<button type="button" class="remove-btn" onclick="removeParent(this)">X</button>
            <div class="form-group" style="margin-bottom:5px;"><label>${TRAIT_CFG.field_name}:</label><input type="text" class="tr-name" value="${name}"></div>
            <div class="form-group" style="margin-bottom:5px;"><label>${TRAIT_CFG.field_grade}:</label><input type="text" class="tr-grade" value="${grade}"></div>
            <div class="form-group" style="margin-bottom:0;"><label>${TRAIT_CFG.field_effect}:</label><textarea class="tr-effect" rows="2">${effect}</textarea></div>`;
        document.getElementById('traits-container').appendChild(div);
    }

    function addCustomSkill(name='', realm='', desc='', effect='') {
        const mode = CONFIG?.character?.skill_mode || 'generic';
        const div = document.createElement('div');
        div.className = 'dynamic-card skill-card';
        if (mode === 'coc') {
            div.innerHTML = `<button type="button" class="remove-btn" onclick="removeParent(this)">X</button>
                <div class="form-group" style="margin-bottom:0; display:flex; align-items:center; gap:8px;">
                    <label>技能名:</label><input type="text" class="sk-name" value="${name}" style="flex:1; width:auto;">
                    <input type="number" class="sk-val" value="${realm || 5}" min="0" max="99" style="width:60px; padding:6px;">
                    <span style="font-size:13px">%</span>
                </div>`;
        } else if (mode === 'dnd') {
            const statOptions = (CONFIG.character.stats || []).map(s => `<option value="${s.key}"${(realm === s.key ? ' selected' : '')}>${s.short}</option>`).join('');
            div.innerHTML = `<button type="button" class="remove-btn" onclick="removeParent(this)">X</button>
                <div class="form-group" style="margin-bottom:0; display:flex; align-items:center; gap:8px;">
                    <input type="checkbox" class="sk-prof" style="width:16px; height:16px;" ${effect ? 'checked' : ''}>
                    <input type="text" class="sk-name" placeholder="技能名" value="${name}" style="flex:1; width:auto;">
                    <select class="sk-stat" style="width:72px; padding:6px;">${statOptions}</select>
                </div>`;
        } else {
            div.innerHTML = `<button type="button" class="remove-btn" onclick="removeParent(this)">X</button>
                <div class="form-group" style="margin-bottom:5px;"><label>名字:</label><input type="text" class="sk-name" value="${name}"></div>
                <div class="form-group" style="margin-bottom:5px;"><label>等级:</label><input type="text" class="sk-realm" value="${realm}"></div>
                <div class="form-group" style="margin-bottom:5px;"><label>介绍:</label><textarea class="sk-desc" rows="2">${desc}</textarea></div>
                <div class="form-group" style="margin-bottom:0;"><label>效果:</label><textarea class="sk-effect" rows="2">${effect}</textarea></div>`;
        }
        document.getElementById('skills-container').appendChild(div);
    }

    function addItem(name='', desc='') {
        const div = document.createElement('div');
        div.className = 'dynamic-card item-card';
        div.innerHTML = `<button type="button" class="remove-btn" onclick="removeParent(this)">X</button>
            <div class="form-group" style="margin-bottom:5px;"><label>物品名:</label><input type="text" class="it-name" value="${name}"></div>
            <div class="form-group" style="margin-bottom:0;"><label>描述/数量:</label><input type="text" class="it-desc" value="${desc}"></div>`;
        document.getElementById('items-container').appendChild(div);
    }

    function fillForm(data) {
        myCharId = data.id;
        localStorage.setItem('char_id', myCharId);
        ['traits-container','skills-container','items-container'].forEach(id => document.getElementById(id).innerHTML = '');
        document.getElementById('charName').value = data.name || '';
        document.getElementById('charRealm').value = data.realm || '';
        document.getElementById('charApp').value = data.appearance || '';
        document.getElementById('charBg').value = data.background || '';
        // Password is never returned by the server; show hint if one was set
        if (data.has_password) {
            document.getElementById('pwd-hint').style.display = '';
        }
        CONFIG.character.stats.forEach(s => {
            const el = document.getElementById('attr-' + s.key);
            if (el) el.value = data.stats?.[s.key] ?? s.default;
        });
        if (CONFIG.currency.enabled) {
            CONFIG.currency.units.forEach(u => {
                const el = document.getElementById('coin-' + u.key);
                if (el) el.value = data.assets?.[u.key] ?? 0;
            });
        }
        if (data.traits) data.traits.forEach(t => addTrait(t.name, t.grade, t.effect));
        fillSkills(data.skills || []);
        if (data.items) data.items.forEach(i => addItem(i.name, i.desc));
        calcStats();
        submitBtn.innerText = '💾 保存并更新角色卡';
        statusBar.style.display = 'block';
        statusBar.innerText = `已加载【${data.name}】`;
        statusBar.style.background = '#c6f6d5'; statusBar.style.color = '#276749';
    }

    function initEmpty() {
        ['traits-container','skills-container','items-container'].forEach(id => document.getElementById(id).innerHTML = '');
        ['charName','charRealm','charApp','charBg','charPwd'].forEach(id => document.getElementById(id).value = '');
        CONFIG.character.stats.forEach(s => { const el = document.getElementById('attr-' + s.key); if (el) el.value = s.default; });
        if (CONFIG.currency.enabled) CONFIG.currency.units.forEach(u => { const el = document.getElementById('coin-' + u.key); if (el) el.value = 0; });
        const mode = CONFIG?.character?.skill_mode || 'generic';
        if (mode === 'coc') document.querySelectorAll('.skill-val-input').forEach(i => { i.value = i.dataset.base; });
        else if (mode === 'dnd') document.querySelectorAll('.prof-check').forEach(c => { c.checked = false; });
        else addCustomSkill();
        addTrait(); addItem(); calcStats();
    }

    async function loadCharacter() {
        const targetId = urlId || myCharId;
        if (!targetId) { initEmpty(); return; }
        statusBar.style.display = 'block';
        statusBar.innerText = '正在加载角色数据...';
        try {
            const params = urlPwd ? `?pwd=${urlPwd}` : '';
            let response = await fetch(`/api/get/${targetId}${params}`);
            if (response.status === 403) {
                const inputPwd = prompt('此角色卡设有密码保护，请输入密码：');
                if (!inputPwd) { initEmpty(); return; }
                response = await fetch(`/api/get/${targetId}?pwd=${encodeURIComponent(inputPwd)}`);
                if (!response.ok) { alert('密码错误！'); window.location.href = '/list'; return; }
            }
            const result = await response.json();
            if (result.status === 'success') {
                fillForm(result.data);
            } else {
                localStorage.removeItem('char_id'); myCharId = null; initEmpty();
                statusBar.innerText = '未找到角色数据，请创建新卡。';
                statusBar.style.background = '#fed7d7'; statusBar.style.color = '#c53030';
            }
        } catch(e) { initEmpty(); }
    }

    document.getElementById('resetBtn').addEventListener('click', () => {
        if (confirm('确定要建新卡吗？(旧卡将保留在服务器)')) {
            localStorage.removeItem('char_id');
            window.location.href = roomId !== 'global' ? `/create?room=${roomId}&new=1` : '/create?new=1';
        }
    });

    submitBtn.addEventListener('click', async () => {
        if (CONFIG.currency.enabled) calcCurrency();
        const gatherData = (selector, fields) => {
            const arr = [];
            document.querySelectorAll(selector).forEach(card => {
                const obj = {};
                fields.forEach(f => obj[f.key] = card.querySelector(f.cls)?.value || '');
                if (obj[fields[0].key]) arr.push(obj);
            });
            return arr;
        };
        const stats = {};
        CONFIG.character.stats.forEach(s => { stats[s.key] = document.getElementById('attr-' + s.key)?.value || s.default; });
        const assets = {};
        if (CONFIG.currency.enabled) CONFIG.currency.units.forEach(u => { assets[u.key] = document.getElementById('coin-' + u.key)?.value || 0; });

        const characterData = {
            name: document.getElementById('charName').value || '无名氏',
            realm: document.getElementById('charRealm').value || '',
            appearance: document.getElementById('charApp').value || '',
            background: document.getElementById('charBg').value || '',
            password: document.getElementById('charPwd').value || '',
            stats, assets,
            traits: gatherData('.trait-card', [{key:'name',cls:'.tr-name'},{key:'grade',cls:'.tr-grade'},{key:'effect',cls:'.tr-effect'}]),
            skills: collectSkills(),
            items:  gatherData('.item-card',  [{key:'name',cls:'.it-name'},{key:'desc',cls:'.it-desc'}])
        };

        submitBtn.innerText = '保存中...';
        try {
            const res = await fetch('/api/save', {
                method: 'POST',
                headers: {'Content-Type': 'application/json'},
                body: JSON.stringify({id: myCharId, room_id: roomId, data: characterData})
            });
            const result = await res.json();
            if (result.status === 'success') {
                myCharId = result.id;
                localStorage.setItem('char_id', myCharId);
                alert(`【${characterData.name}】已保存！`);
                submitBtn.innerText = '💾 保存并更新角色卡';
                statusBar.style.display = 'block';
                statusBar.innerText = '数据已同步';
                statusBar.style.background = '#c6f6d5'; statusBar.style.color = '#276749';
            }
        } catch(e) {
            alert('保存失败！');
            submitBtn.innerText = myCharId ? '💾 保存并更新角色卡' : '创建角色卡';
        }
    });

    init();
</script>
</body>
</html>
