<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>主页</title>
    <style>
        :root { --primary-color: #8b2121; --bg-color: #f4eee1; --border-color: #cbb494; }
        body { font-family: 'Microsoft YaHei', sans-serif; background-color: var(--bg-color); color: #333; margin: 0; min-height: 100vh; display: flex; flex-direction: column; align-items: center; justify-content: center; }
        .hero { text-align: center; padding: 40px 20px; }
        h1 { color: var(--primary-color); font-size: 3em; margin-bottom: 10px; }
        .subtitle { color: #666; font-size: 1.2em; margin-bottom: 40px; }
        .btn-group { display: flex; gap: 20px; justify-content: center; flex-wrap: wrap; }
        .btn { padding: 15px 30px; border-radius: 8px; text-decoration: none; font-size: 1.1em; font-weight: bold; transition: 0.2s; }
        .btn-primary { background: var(--primary-color); color: white; }
        .btn-secondary { background: #555; color: white; }
        .btn:hover { filter: brightness(1.15); transform: translateY(-2px); }
        .footer { margin-top: 60px; color: #aaa; font-size: 0.85em; }
        .footer a { color: #aaa; }
    </style>
</head>
<body>
    <div class="hero">
        <h1 id="site-name">TRPG Card Hub</h1>
        <p class="subtitle" id="site-desc">跑团角色卡管理系统</p>
        <div class="btn-group">
            <a href="/create" class="btn btn-primary">🗡️ 创建角色卡</a>
            <a href="/list" class="btn btn-secondary">📜 角色卡大厅</a>
        </div>
    </div>
    <div class="footer">
        <p>Open Source · <a href="https://github.com/ZhenWei-Shi/trpg-card-hub" target="_blank">GitHub</a></p>
    </div>
    <script>
        fetch('/api/config').then(r => r.json()).then(cfg => {
            const t = cfg.theme;
            document.documentElement.style.setProperty('--primary-color', t.primary_color);
            document.documentElement.style.setProperty('--bg-color', t.bg_color);
            document.documentElement.style.setProperty('--border-color', t.border_color);
            document.title = cfg.app.name;
            document.getElementById('site-name').textContent = cfg.app.name;
            document.getElementById('site-desc').textContent = cfg.app.description;
        });
    </script>
</body>
</html>
